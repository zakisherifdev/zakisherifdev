}

<body>

  <canvas id="stars"></canvas>
  <div class="text">
    zakisherifdev.<span>com</span>
  </div>
  

  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d', { alpha: true });

    let width, height;
    const stars = [];

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    class Star {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 1.8 + 0.6;
        this.speed = Math.random() * 0.8 + 0.25;
        this.opacity = Math.random() * 0.7 + 0.5;
      }
      update() {
        this.y += this.speed;
        if (this.y > height) this.reset();
      }
      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }
    }

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < 420; i++) {   // عدد منخفض للأداء
        stars.push(new Star());
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';  // trail أقوى = أداء أفضل
      ctx.fillRect(0, 0, width, height);

      for (let star of stars) {
        star.update();
        star.draw();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resize();
      initStars();
    });

    resize();
    initStars();
    animate();
  </script>

</body>

    <title>منع نسخ الصور</title>
    
    <script>
document.addEventListener('DOMContentLoaded', function() {
    const longClickElement = document.getElementById('myLongClickPrevent');
    let pressTimer;

    if (longClickElement) {
        longClickElement.addEventListener('mousedown', function(e) {
            // منع تحديد النص مباشرة عند بداية النقر إذا أردت
            e.preventDefault();

            pressTimer = setTimeout(function() {
                // هذا الكود سيتم تشغيله بعد "نقر مطول" (مثلاً 500ms)
                alert('تم اكتشاف نقرة طويلة! تم منع أي سلوك افتراضي.');
                // هنا يمكنك منع المزيد من الإجراءات مثل عرض قائمة السياق
                // إذا أردت منع قائمة السياق:
                // longClickElement.addEventListener('contextmenu', function(ce) {
                //     ce.preventDefault();
                // });

            }, 500); // 500 ميلي ثانية للنقر المطول
        });

        longClickElement.addEventListener('mouseup', function(e) {
            clearTimeout(pressTimer); // مسح المؤقت إذا تم تحرير الزر قبل النقر المطول
        });

        longClickElement.addEventListener('mouseleave', function(e) {
            clearTimeout(pressTimer); // مسح المؤقت إذا غادر المؤشر العنصر
        });

        // لمنع قائمة السياق (context menu) التي قد تظهر عند النقر المطول بالزر الأيمن
        longClickElement.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            alert('قائمة السياق معطلة لهذا العنصر.');
        });
        document.addEventListener('DOMContentLoaded', function() {
    // لمنع النسخ من عنصر معين (مثلاً فقرة بمعرف "noCopyParagraph")
    const noCopyParagraph = document.getElementById('noCopyParagraph');
    if (noCopyParagraph) {
        noCopyParagraph.addEventListener('copy', function(event) {
            event.preventDefault(); // يمنع النسخ
            console.log('تم منع النسخ من هذا العنصر.');
            // يمكنك إظهار رسالة للمستخدم هنا إذا أردت
            // alert('النسخ غير مسموح به!');
        });
    }

    // لمنع النسخ من كامل المستند (أكثر شمولاً)
    document.addEventListener('copy', function(event) {
        event.preventDefault(); // يمنع النسخ من أي مكان في الصفحة
        console.log('تم منع النسخ من الصفحة بأكملها.');
        // alert('لا يُسمح بالنسخ في هذه الصفحة!');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const elementToProtect = document.getElementById('myProtectedElement');
    if (elementToProtect) {
        elementToProtect.addEventListener('contextmenu', function(event) {
            event.preventDefault(); // يمنع ظهور قائمة السياق
            console.log('تم منع قائمة السياق.');
        });
    }

    // لمنع قائمة السياق من كامل المستند
    document.addEventListener('contextmenu', function(event) {
        event.preventDefault();
        console.log('تم منع قائمة السياق من كامل المستند.');
    });
});

    }
});

    </script>
